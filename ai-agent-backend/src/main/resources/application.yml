server:
  port: 8080

spring:
  application:
    name: ai-agent-backend
  
  datasource:
    url: jdbc:h2:file:./data/agentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Ollama Configuration
ollama:
  base-url: http://localhost:11434
  model: llama3.1
  temperature: 0.5
  summarize-temperature: 0.3

# CORS Configuration
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000

# Actuator (Health & Metrics)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.aiagent: DEBUG
    org.springframework.web: INFO
